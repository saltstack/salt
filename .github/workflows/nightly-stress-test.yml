name: Nightly Stress Test

on:
  schedule:
    - cron: '0 2 * * *' # 2 AM UTC
  workflow_dispatch:
    inputs:
      duration:
        description: 'Duration of the stress test (e.g., 30m, 1h)'
        required: true
        default: '30m'

jobs:
  stress-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and Start Environment
        run: |
          cd tests/monitoring
          # The prometheus container runs as ``nobody`` (uid 65534) and
          # writes its TSDB to ``/prometheus``.  Without pre-creating the
          # bind-mount source with that ownership, Docker auto-creates
          # it owned by root and prometheus fails to start with
          # "permission denied" on /prometheus -- which then surfaces
          # downstream as a bare ConnectionRefusedError when
          # analyze_stats.py tries to query http://localhost:19090.
          mkdir -p prometheus_data
          sudo chown -R 65534:65534 prometheus_data
          docker compose build
          docker compose up -d
          sleep 30 # Wait for initialization

      - name: Verify Connections
        # The salt CLI returns exit 0 even when the master returns an
        # error string (the legacy ``'str' object has no attribute
        # 'pop'`` failure path surfaces this way), so we have to inspect
        # the JSON output ourselves to fail the step.
        run: |
          out=$(docker exec salt-master salt --out=json '*' test.ping)
          echo "$out"
          python3 - "$out" <<'PY'
          import json, sys
          payload = sys.argv[1].strip()
          decoder = json.JSONDecoder()
          idx = 0
          bad = []
          while idx < len(payload):
              while idx < len(payload) and payload[idx].isspace():
                  idx += 1
              if idx >= len(payload):
                  break
              try:
                  obj, end = decoder.raw_decode(payload, idx)
              except ValueError as exc:
                  bad.append(f"  non-JSON at offset {idx}: {exc}")
                  break
              idx = end
              if isinstance(obj, dict):
                  for mid, val in obj.items():
                      if val is not True:
                          bad.append(f"  minion {mid!r} returned {val!r}")
              else:
                  bad.append(f"  unexpected payload type: {type(obj).__name__}={obj!r}")
          if bad:
              print("Verify Connections failed:", file=sys.stderr)
              for b in bad:
                  print(b, file=sys.stderr)
              sys.exit(1)
          PY

      - name: Run Aggressive Stress Test
        run: |
          cd tests/monitoring
          chmod +x stress_test.sh stress_api.sh
          # Run in background and wait for defined duration
          ./stress_test.sh &
          STRESS_PID=$!

          # Default to 30m if not workflow_dispatch
          DURATION="${{ github.event.inputs.duration || '30m' }}"
          echo "Running stress test for $DURATION..."

          # Use sleep with suffix support (m, h)
          sleep $DURATION

          echo "Stopping stress test..."
          pkill -P $STRESS_PID || true
          kill $STRESS_PID || true

      - name: Analyze Results
        run: |
          cd tests/monitoring
          # Give Prometheus a moment to finish scraping the final points
          sleep 30
          python3 analyze_stats.py

      - name: Render Dashboard Panels
        # Render BEFORE Snapshot Metrics stops prometheus.  We *only*
        # produce the PNGs here; the markdown step-summary that links
        # to them runs after the upload so it can embed a real URL.
        # Runs even if Analyze Results failed -- the graphs are usually
        # the most useful diagnostic for a failed run.
        if: always()
        run: |
          cd tests/monitoring
          python3 -m pip install --quiet matplotlib
          PANELS_DIR="${GITHUB_WORKSPACE}/artifacts/panels" \
            python3 render_panels.py

      - name: Snapshot Metrics
        if: always()
        run: |
          # Stop containers to ensure data is flushed to disk
          cd tests/monitoring
          docker compose stop prometheus
          sudo tar -czf ../../prometheus-data.tar.gz ./prometheus_data

      - name: Collect Logs on Failure
        if: failure()
        run: |
          mkdir -p artifacts
          docker logs salt-master > artifacts/salt-master.log
          docker logs salt-minion-1 > artifacts/salt-minion-1.log
          cp tests/monitoring/event_log.txt artifacts/ || true
          # Always grab prometheus' own log so we can tell whether the
          # connection refused was a startup issue (bind mount permissions
          # etc.) vs. a runtime crash.
          docker logs prometheus > artifacts/prometheus.log 2>&1 || true

      - name: Upload Artifacts
        id: upload-artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-test-results
          path: |
            artifacts/
            prometheus-data.tar.gz

      - name: Panel Summary
        # Build the workflow step summary from the PNGs the Render
        # step already produced, NOT by re-querying prometheus -- by
        # this point ``Snapshot Metrics`` has stopped the prometheus
        # container, so every range query would return no data.
        # GitHub's step-summary sanitizer strips ``data:`` URIs from
        # image sources, so we can't embed the PNGs inline either --
        # we link to the uploaded artifact bundle instead.
        if: always()
        run: |
          cd tests/monitoring
          PANELS_DIR="${GITHUB_WORKSPACE}/artifacts/panels" \
            python3 render_panels.py --summary --from-existing \
              --artifact-name stress-test-results \
              --artifact-url "${{ steps.upload-artifacts.outputs.artifact-url }}"
