---
name: setup-python-tools-scripts
description: Setup 'python-tools-scripts' using UV

inputs:
  cwd:
    description: The directory the salt checkout is located in
    default: "."

outputs:
  version:
    description: "Return the python-tools-scripts version"
    value: ${{ steps.get-version.outputs.version }}


runs:
  using: composite

  steps:
    - name: Setup UV
      uses: astral-sh/setup-uv@v1
      with:
        version: "latest"
    - name: Install python-tools-scripts via UV
      shell: bash
      working-directory: ${{ inputs.cwd }}
      run: |
        # UV handles Python version from .python-version automatically
        # Install python-tools-scripts and all dev dependencies
        uv pip install ".[dev]"
    - name: Get 'python-tools-scripts' Version
      id: get-version
      shell: bash
      working-directory: ${{ inputs.cwd }}
      run: |
        VERSION=$(uv run tools --version | tail -n 1)
        echo "version=$VERSION" >> "${GITHUB_OUTPUT}"
