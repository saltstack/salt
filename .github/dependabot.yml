version: 2
updates:
  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/requirements/static/ci"
      - "/requirements/static/pkg"
    schedule:
      interval: "weekly"
    target-branch: master
    labels:
      - "test:full"
    open-pull-requests-limit: 5
    groups:
      all-pip-updates:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/requirements/static/ci"
      - "/requirements/static/pkg"
    schedule:
      interval: "weekly"
    target-branch: 3008.x
    labels:
      - "test:full"
    open-pull-requests-limit: 5
    groups:
      all-pip-updates:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directories:
