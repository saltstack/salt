version: 2
updates:
  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/requirements/static/ci"
      - "/requirements/static/pkg"
    schedule:
      interval: "weekly"
    target-branch: master
    labels:
      - "test:full"
    open-pull-requests-limit: 5
    # vcert 0.18+ hard-pins pynacl/cryptography/six against the rest of CI, and
    # pylint 4.x turns pre-existing warnings into hard CI failures; both are
    # deliberately held (see the comments in requirements/static/ci/*.txt).
    ignore:
      - dependency-name: "vcert"
        versions: [">=0.10.0"]
      - dependency-name: "pylint"
        versions: [">=4.0.0"]
    groups:
      all-pip-updates:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/requirements/static/ci"
      - "/requirements/static/pkg"
    schedule:
      interval: "weekly"
    target-branch: 3008.x
    labels:
      - "test:full"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "vcert"
        versions: [">=0.10.0"]
      - dependency-name: "pylint"
        versions: [">=4.0.0"]
    groups:
      all-pip-updates:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/requirements/static/ci"
      - "/requirements/static/pkg"
    schedule:
      interval: "weekly"
    target-branch: 3007.x
    labels:
      - "test:full"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "vcert"
        versions: [">=0.10.0"]
      - dependency-name: "pylint"
        versions: [">=4.0.0"]
    groups:
      all-pip-updates:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/requirements/static/ci"
      - "/requirements/static/pkg"
    schedule:
      interval: "weekly"
    target-branch: 3006.x
    labels:
      - "test:full"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "vcert"
        versions: [">=0.10.0"]
