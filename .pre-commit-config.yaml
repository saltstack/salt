---
exclude: ^(doc/_static/.*|doc/_themes/.*)$
repos:

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-merge-conflict  # Check for files that contain merge conflict strings.
      - id: trailing-whitespace   # Trims trailing whitespace.
        args:
          - --markdown-linebreak-ext=md
        exclude: >
          (?x)^(
            pkg/macos/pkg-resources/.*\.rtf|
            pkg/patches/.*\.patch
          )$

      - id: mixed-line-ending     # Replaces or checks mixed line ending.
        args:
          - --fix=lf
      - id: end-of-file-fixer     # Makes sure files end in a newline and only a newline.
      - id: check-ast             # Simply check whether files parse as valid python.
        exclude: >
          (?x)^(
            templates/.*
          )$
      - id: check-case-conflict   # Check for files with names that would conflict on a
                                  # case-insensitive filesystem like MacOS HFS+ or Windows FAT.
      - id: check-json            # Attempts to load all json files to verify syntax.
      - id: check-symlinks        # Checks for symlinks which do not point to anything.
      - id: debug-statements      # Check for debugger imports and breakpoint() calls in python source.
        exclude: >
          (?x)^(
            templates/.*
          )$
      - id: fix-byte-order-marker # removes UTF-8 byte order marker
      - id: forbid-submodules     # forbids any submodules in the repository.
      - id: fix-encoding-pragma   # Remove `# -*- coding: utf-8 -*-` from the top of python files.
        args:
          - --remove
        exclude: >
          (?x)^(
            salt/ext/.*
          )$

  - repo: https://github.com/saltstack/python-tools-scripts
    rev: "0.20.5"
    hooks:
      - id: tools
        alias: check-changelog-entries
        name: Check Changelog Entries
        additional_dependencies:
          - boto3
          - pyyaml
          - jinja2
          - MarkupSafe<3.0.0
          - packaging
        args:
          - pre-commit
          - changelog
          - pre-commit-checks

      - id: tools
        alias: generate-workflows
        name: Generate GitHub Workflow Templates
        files: ^(cicd/shared-gh-workflows-context\.yml|tools/utils/__init__.py|tools/precommit/workflows\.py|.github/workflows/.*)$
        pass_filenames: false
        additional_dependencies:
          - boto3
          - pyyaml
          - jinja2
          - MarkupSafe<3.0.0
          - packaging
        args:
          - pre-commit
          - workflows
          - generate-workflows

      - id: tools
        alias: actionlint
        name: Lint GitHub Actions Workflows
        files: "^.github/workflows/"
        types:
          - yaml
        additional_dependencies:
          - boto3
          - pyyaml
          - jinja2
          - MarkupSafe<3.0.0
          - packaging
        args:
          - pre-commit
          - workflows
          - actionlint

      - id: tools
        alias: check-docs
        name: Check Docs
        files: ^(salt/.*\.py|doc/ref/.*\.rst)$
        additional_dependencies:
          - boto3
          - pyyaml
          - jinja2
          - MarkupSafe<3.0.0
          - packaging
        args:
          - pre-commit
          - docs
          - check

      - id: tools
        alias: check-docstrings
        name: Check docstrings
        files: salt/.*\.py$
        exclude: >
            (?x)^(
                templates/.*|
                salt/ext/.*|
            )$
        additional_dependencies:
          - boto3
          - pyyaml
          - jinja2
          - MarkupSafe<3.0.0
          - packaging
        args:
          - pre-commit
          - docstrings
          - check

      - id: tools
        alias: check-cp1252-docstrings
        name: Check docstrings encode in cp1252 (Windows stdout)
        files: salt/.*\.py$
        exclude: >
            (?x)^(
                templates/.*|
                salt/ext/.*|
            )$
        additional_dependencies:
          - boto3
          - pyyaml
          - jinja2
          - MarkupSafe<3.0.0
          - packaging
        args:
          - pre-commit
          - docstrings
          - check-cp1252

      - id: tools
        alias: check-known-missing-docstrings
        name: Check Known Missing Docstrings
        stages: [manual]
        files: salt/.*\.py$
        exclude: >
            (?x)^(
                templates/.*|
                salt/ext/.*|
            )$
        additional_dependencies:
          - boto3
          - pyyaml
          - jinja2
          - MarkupSafe<3.0.0
          - packaging
        args:
          - pre-commit
          - docstrings
          - check

      - id: tools
        alias: loader-check-virtual
        name: Check loader modules __virtual__
        files: salt/.*\.py$
        exclude: >
            (?x)^(
                templates/.*|
                salt/ext/.*|
            )$
        additional_dependencies:
          - boto3
          - pyyaml
          - jinja2
          - MarkupSafe<3.0.0
          - packaging
        args:
          - pre-commit
          - salt-loaders
          - check-virtual

      - id: tools
        alias: check-filemap
        name: Check Filename Map Change Matching
        files: ^tests/(filename_map\.yml|.*\.py)$
        pass_filenames: false
        additional_dependencies:
          - boto3
          - pyyaml
          - jinja2
          - MarkupSafe<3.0.0
          - packaging
        args:
          - pre-commit
          - filemap
          - check

  # ----- Packaging Requirements ------------------------------------------------------------------------------------>
  # IMPORTANT: We do not pin setuptools here to avoid conflicts with requirements/constraints.txt.
