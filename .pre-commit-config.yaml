      ############### Linux CI Requirements ###############
      - id: pip-compile
        alias: compile-ci-linux-3.9-zmq-requirements
        name: Linux CI Py3.9 ZeroMQ Requirements
        files: ^requirements/(constraints\.lock|(base|zeromq|pytest)\.lock|static/((ci|pkg)/(linux\.txt|common\.txt)|py3\.9/linux\.lock))$
        pass_filenames: false
        additional_dependencies: ["pip<26.0"]
        args:
          - requirements/base.txt
          - requirements/pytest.txt
          - requirements/zeromq.txt
          - requirements/static/ci/common.txt
          - requirements/static/ci/linux.txt
          - --python-platform=linux
          - --python-version=3.9
          - --constraint
          - requirements/constraints.txt
          - --no-emit-index-url
          - --unsafe-package=setuptools
          - -c=requirements/static/pkg/py3.9/linux.lock
          - -o=requirements/static/ci/py3.9/linux.lock

