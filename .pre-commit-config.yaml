  # <---- Tools -----------------------------------------------------------------------------------------------------

  # ----- Code Formatting ------------------------------------------------------------------------------------------->
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        name: Upgrade code to Py3.10+
        args: [--py310-plus, --keep-mock]
        exclude: >
          (?x)^(
            salt/client/ssh/ssh_py_shim.py
            |
            salt/client/ssh/wrapper/pillar.py
            |
            salt/ext/.*\.py
          )$

  - repo: https://github.com/saltstack/pre-commit-remove-import-headers
    rev: 1.1.0
    hooks:
      - id: remove-import-headers

  - repo: https://github.com/saltstack/salt-rewrite
    # Automatically rewrite code with known rules
    rev: 2.5.2
    hooks:
      - id: salt-rewrite
        alias: rewrite-docstrings
        name: Salt docstrings auto-fixes
        files: ^salt/.*\.py$
        args: [--silent, -F, fix_docstrings]
        exclude: >
            (?x)^(
                salt/ext/.*
            )$

      - id: salt-rewrite
        alias: rewrite-tests
        name: Rewrite Salt's Test Suite
        files: ^tests/.*\.py$
        # Inhibited to prevent global rewrites
        entry: echo "Inhibited rewrite-tests"
        language: python
        always_run: true
        pass_filenames: false
        exclude: >
            (?x)^(
                tests/pytests/unit/utils/test_versions.py|
                tests/pytests/functional/transport/tcp/test_pub_server.py
            )$

  - repo: local
    hooks:
      - id: enforce-tornado-imports
        name: Enforce Tornado Imports
        # Inhibited to prevent global rewrites
        entry: echo "Inhibited enforce-tornado-imports"
        language: python
        always_run: true
        pass_filenames: false
        files: \.py$
        types: [python]
        exclude: >
            (?x)^(
                salt/ext/.*
            )$
        exclude: >
            (?x)^(
                tests/pytests/unit/utils/test_versions.py|
                tests/pytests/functional/transport/tcp/test_pub_server.py
            )$

  - repo: https://github.com/timothycrosley/isort
    rev: 5.13.2
    hooks:
      - id: isort
        additional_dependencies: ['toml']
        # This tells pre-commit not to pass files to isort.
        # This should be kept in sync with pyproject.toml
        exclude: >
            (?x)^(
                templates/.*|
                salt/ext/.*|
            )$

  - repo: https://github.com/psf/black
    rev: 24.2.0
    hooks:
      - id: black
        # This tells pre-commit not to pass files to black.
        # This should be kept in sync with pyproject.toml
        exclude: >
            (?x)^(
                salt/client/ssh/ssh_py_shim\.py|
                templates/.*|
                salt/ext/.*|
            )$

  - repo: https://github.com/asottile/blacken-docs
    rev: 1.16.0
    hooks:
      - id: blacken-docs
        args: [--skip-errors]
        files: ^doc/.*\.rst
        additional_dependencies:
          - black==24.2.0

  # <---- Code Formatting --------------------------------------------------------------------------------------------

  # ----- Security -------------------------------------------------------------------------------------------------->
  - repo: https://github.com/PyCQA/bandit
    rev: "1.7.7"
    hooks:
      - id: bandit
        alias: bandit-salt
        name: Run bandit against Salt
        args: [--silent, -lll, --skip, "B701,B324"]
        exclude: >
            (?x)^(
                templates/.*|
                salt/ext/.*|
                tests/.*
            )$
        additional_dependencies: ['importlib_metadata<5']
  - repo: https://github.com/PyCQA/bandit
    rev: "1.7.7"
    hooks:
      - id: bandit
        alias: bandit-tests
        name: Run bandit against the test suite
        args: [--silent, -lll, --skip, "B701,B324"]
        files: ^tests/.*
        exclude: ^tests/minionswarm\.py
        additional_dependencies: ['importlib_metadata<5']
  # <---- Security ---------------------------------------------------------------------------------------------------

  # ----- Pre-Commit ------------------------------------------------------------------------------------------------>
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        alias: mypy-tools
        name: Run mypy against tools
        files: ^tools/.*\.py$
        exclude: >
            (?x)^(
                templates/.*|
                salt/.*|
            )$
        additional_dependencies:
          - attrs
          - rich
          - types-attrs
          - types-pyyaml
          - types-requests
          - python-tools-scripts==0.20.0

  - repo: local
    hooks:
      - id: lint-salt
        name: Lint Salt
        entry: bash -c 'env -u NOX_FORCE_COLOR -u NOX_NO_COLOR -u FORCE_COLOR -u NO_COLOR nox "$@"' --
        language: python
        language_version: python3.14
        files: ^((setup|noxfile)|(salt|tools)/.*)\.py$
        exclude: >
            (?x)^(
                templates/.*|
                salt/ext/.*|
            )$
        args:
          - -e
          - lint-salt-pre-commit
          - --
        additional_dependencies:
          - nox==2022.11.21
          # Pip/setuptools pins must run on the hook interpreter (Python 3.12+ in CI):
          # pip 20.x still imports distutils, removed from the stdlib in 3.12.
          # pip 23.x trips on Py 3.14 metadata parsing; 25.x is needed.
          # Pip must match requirements/constraints.txt (pip == 25.2) so the
          # noxfile's PIP_CONSTRAINT install does not try to downgrade.
          - setuptools>=80.10.2
          - pip==25.2

  - repo: local
    hooks:
      - id: lint-tests
        name: Lint Tests
        entry: bash -c 'env -u NOX_FORCE_COLOR -u NOX_NO_COLOR -u FORCE_COLOR -u NO_COLOR nox "$@"' --
        language: python
        language_version: python3.14
        files: ^tests/.*\.py$
        args:
          - -e
          - lint-tests-pre-commit
          - --
        additional_dependencies:
          - nox==2022.11.21
          # Pip/setuptools pins must run on the hook interpreter (Python 3.12+ in CI):
          # pip 20.x still imports distutils, removed from the stdlib in 3.12.
          # pip 23.x trips on Py 3.14 metadata parsing; 25.x is needed.
          # Pip must match requirements/constraints.txt (pip == 25.2) so the
          # noxfile's PIP_CONSTRAINT install does not try to downgrade.
          - setuptools>=80.10.2
          - pip==25.2
  # <---- Pre-Commit -------------------------------------------------------------------------------------------------
