      ############### Linux PKG Requirements ###############
      - id: pip-compile
        alias: compile-pkg-linux-3.9-zmq-requirements
        name: Linux Packaging Py3.9 ZeroMQ Requirements
        files: ^requirements/(constraints\.lock|(base|zeromq|crypto)\.lock|static/pkg/(linux\.txt|py3\.9/linux\.lock))$
        pass_filenames: false
        additional_dependencies: ["pip<26.0"]
        args:
          - requirements/base.txt
          - requirements/zeromq.txt
          - requirements/crypto.txt
          - requirements/static/pkg/linux.txt
          - --python-platform=linux
          - --python-version=3.9
          - --constraint
          - requirements/constraints.txt
          - --no-emit-index-url
          - -o=requirements/static/pkg/py3.9/linux.lock

