[project]
name = "salt"
dynamic = ["version"]
description = "Portable, distributed, remote execution and configuration management system"
readme = "README.rst"
authors = [{ name = "Thomas S Hatch", email = "thatch45@gmail.com" }]
maintainers = [{ name = "Salt Project", email = "salt@saltstack.com" }]
license = { file = "LICENSE" }
classifiers = [
    "Programming Language :: Python",
    "Programming Language :: Cython",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Development Status :: 5 - Production/Stable",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "Intended Audience :: System Administrators",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: POSIX :: Linux",
    "Topic :: System :: Clustering",
    "Topic :: System :: Distributed Computing",
]
requires-python = ">=3.5"

[project.urls]
Homepage = "https://saltproject.io"
Documentation = "https://docs.saltproject.io"
Repository = "https://github.com/saltstack/salt"
"Bug Tracker" = "https://github.com/saltstack/salt/issues"
Discord = "https://discord.com/invite/J7b7EscrAs"

# Note: Entry points are dynamically generated by the build backend (salt_build.backend)
# based on platform and environment.

[build-system]
requires = ["setuptools>=61", "wheel"]
backend-path = ["."]
build-backend = "salt_build.backend"

[tool.setuptools]
packages = ["salt"]
package-dir = { "" = "." }

[tool.setuptools.package-data]
salt = ["_version.txt"]
"salt.templates" = [
    "rh_ip/*.jinja",
    "suse_ip/*.jinja",
    "debian_ip/*.jinja",
    "virt/*.jinja",
    "git/*",
    "lxc/*",
]
"salt.cloud" = ["deploy/*.sh"]

[tool.black]
exclude = "/(salt/ext|templates)/"

[tool.isort]
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
line_length = 88
ensure_newline_before_comments = true
skip = "salt/ext,templates"
known_third_party = ["pytest"]

[tool.towncrier]
package = "salt"
filename = "CHANGELOG.md"
directory = "changelog/"
template = "changelog/.template.jinja"
start_string = "# Changelog\n"
underlines = ["", "", ""]
title_format = "## {version} ({project_date})"
issue_format = "[#{issue}](https://github.com/saltstack/salt/issues/{issue})"

[[tool.towncrier.type]]
directory = "removed"
name = "Removed"
showcontent = true

[[tool.towncrier.type]]
directory = "deprecated"
name = "Deprecated"
showcontent = true

[[tool.towncrier.type]]
directory = "changed"
name = "Changed"
showcontent = true

[[tool.towncrier.type]]
directory = "fixed"
name = "Fixed"
showcontent = true

[[tool.towncrier.type]]
directory = "added"
name = "Added"
showcontent = true

[[tool.towncrier.type]]
directory = "security"
name = "Security"
showcontent = true

[tool.mypy]
packages = ["tools"]
exclude = ["(?x)(", "  salt", "  | tests", "  ).*\\.py"]
implicit_optional = true
show_error_codes = true
warn_return_any = true
warn_unused_configs = true

[tool.mypy."tools.*"]
ignore_missing_imports = true

[tool.mypy."tools.precommit.docstrings"]
follow_imports = "silent"

[tool.mypy."salt.*"]
follow_imports = "silent"
ignore_missing_imports = true
