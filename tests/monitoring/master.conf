interface: 0.0.0.0
publish_port: 44505
ret_port: 44506
open_mode: True
auto_accept: True
log_level: debug
master: salt
master_port: 44506
file_roots:
  base:
    - /srv/salt
worker_threads: 10
worker_resource_backcount: 50
ipc_write_buffer: 104857600

rest_cherrypy:
  port: 8000
  disable_ssl: True

netapi_enable_clients:
  - local
  - runner
  - wheel

external_auth:
  pam:
    salt:
      - .*
      - '@runner'
      - '@wheel'
id: salt-master
